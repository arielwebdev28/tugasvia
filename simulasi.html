<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* Memastikan body minimal setinggi layar */
}

/* Header & Logo */
header {
    background-color: #e87ec1; /* Biru Tua UNRAM */
    color: white;
    padding: 15px 20px;
}

.logo-area {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.unram-logo {
    width: 60px; /* Ukuran Logo UNRAM */
    height: auto;
    margin-right: 15px;
}

.header-text h1 { font-size: 22px; }
.header-text p { font-size: 14px; color: #ccc; }

nav ul {
    display: flex;
    list-style: none;
    background: #78c1ee;
    padding: 8px 15px;
}

nav ul li {
    margin-right: 25px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

nav ul li:hover { color: #72a3ee; }

/* Layout Utama - Ini yang membuat kolom panjang ke bawah */
.main-container {
    display: flex;
    flex: 1; /* Mengisi sisa ruang layar yang tersedia */
}

/* Sidebar Kiri */
.sidebar-left {
    width: 220px;
    background: #f8f9fa;
    border-right: 1px solid #ddd;
    padding: 20px 0;
}

.sidebar-left ul { list-style: none; }
.sidebar-left li {
    padding: 12px 20px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    font-size: 14px;
}

.sidebar-left li:hover { background: #e9ecef; }

/* Konten Tengah */
.content {
    flex: 1;
    padding: 30px;
    background: #ffffff;
}

/* Sidebar Kanan */
.sidebar-right {
    width: 200px;
    background: #73b8e4; /* Hijau toska sesuai gambar */
    color: white;
    padding: 20px;
}

.sidebar-right h3 {
    font-size: 16px;
    margin-bottom: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 5px;
}

.link-box a {
    display: block;
    color: white;
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 10px;
}

/* Halaman & Animasi */
.page-section { display: none; }
.active-page { display: block; animation: fadeIn 0.4s; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Simulasi Canvas */
.canvas-container {
    margin-top: 20px;
    border: 1px solid #ccc;
    background: #fafafa;
    position: relative;
    max-width: 700px;
}

canvas {
      border: 1px solid #333;
      background: #fff;
      margin-top: 20px;
    }

.controls {
    padding: 10px;
    background: #eee;
    text-align: center;
}
.container {
            display: flex;
            min-height: 400px;
        }

        .left {
            width: 20%;
            background:blue;
        }

        .left li {
            position: relative;
            padding: 10px;
            cursor: pointer;
        }

        .left li:hover {
            background: rgb(255, 255, 255);
        }

        .left .submenu {
            display: none;
            position: absolute;
            top: 0;
            left: 100%;
            background:beige;
            min-width: 150px;
        }

        .left li:hover .submenu {
            display: block;
        }
    </style>

<body>
    <header>
        <div class="logo-area">
            <!-- Ganti src dengan file lokal jika ada, atau gunakan link ini -->
            <img src="assets/img/logoUnram.png" alt="Logo UNRAM" class="unram-logo">
            <div class="header-text">
                <h1>Prodi Pendidikan Matematika</h1>
                <p>Universitas Mataram</p>
            </div>
        </div>
        <nav>
            <ul>
                <li class="nav-link active" data-target="home"><a href="index.html">Home</a></li>
                <li class="nav-link" data-target="profil"><a href="profil.html">Profil</a></li>
                <li class="nav-link" data-target="akademik"><a href="akademik.html">Akademik</a></li>
                <li class="nav-link" data-target="kontak"><a href="kontak.html">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-container">
        <!-- Sidebar Kiri (Full Height) -->
        <aside class="sidebar-left">
            <ul>
                <li class="nav-link" data-target="dashboard"><a href="simulasi.html">Simulasi Geometri</a></li>
                <li class="nav-link" data-target="data"><a href="data.html">Data</a></li>
                <li class="nav-link" data-target="laporan"><a href="laporan.html">Laporan</a></li>
            </ul>
        </aside>

        <!-- Konten Utama -->
        <div class="content">
                <h2>Simulasi Geometri Interaktif</h2>
                <hr>
                <p>Geser titik-titik untuk mengubah bentuk segitiga.</p>
                <canvas id="canvas" width="500" height="400"></canvas>

                <script>
                    const canvas = document.getElementById("canvas");
                    const ctx = canvas.getContext("2d");

                    // Titik awal segitiga
                    let points = [
                    {x: 100, y: 300},
                    {x: 250, y: 100},
                    {x: 400, y: 300}
                    ];

                    let dragPoint = null;

                    function draw() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Gambar segitiga
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    ctx.lineTo(points[1].x, points[1].y);
                    ctx.lineTo(points[2].x, points[2].y);
                    ctx.closePath();
                    ctx.strokeStyle = "blue";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = "rgba(0, 0, 255, 0.2)";
                    ctx.fill();

                    // Gambar titik
                    points.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                        ctx.fillStyle = "red";
                        ctx.fill();
                        ctx.stroke();
                    });
                    }

                    function getMousePos(evt) {
                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: evt.clientX - rect.left,
                        y: evt.clientY - rect.top
                    };
                    }

                    canvas.addEventListener("mousedown", evt => {
                    const mouse = getMousePos(evt);
                    points.forEach(p => {
                        const dx = mouse.x - p.x;
                        const dy = mouse.y - p.y;
                        if (Math.sqrt(dx*dx + dy*dy) < 10) {
                        dragPoint = p;
                        }
                    });
                    });

                    canvas.addEventListener("mousemove", evt => {
                    if (dragPoint) {
                        const mouse = getMousePos(evt);
                        dragPoint.x = mouse.x;
                        dragPoint.y = mouse.y;
                        draw();
                    }
                    });

                    canvas.addEventListener("mouseup", () => {
                    dragPoint = null;
                    });

                    draw();
                </script>

        </div>

        <!-- Sidebar Kanan (Full Height) -->
        <aside class="sidebar-right">
            <h3>Shortcut / Link</h3>
            <div class="link-box">
                <a href="https://daring.unram.ac.id/" target="_blank">E-Learning UNRAM</a>
                <a href="https://sia.unram.ac.id/" target="_blank">SIA UNRAM</a>
                <a href="https://library.uinmataram.ac.id/" target="_blank">Perpustakaan</a>
            </div>
        </aside>
    </div>

    
    <script src="assets/js/script.js"></script>
</body>
