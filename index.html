<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Pembelajaran Matematika - UNRAM</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh; /* Memastikan body minimal setinggi layar */
    }

    /* Header & Logo */
    header {
        background-color: #e87ec1; /* Biru Tua UNRAM */
        color: white;
        padding: 15px 20px;
    }

    .logo-area {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }

    .unram-logo {
        width: 60px; /* Ukuran Logo UNRAM */
        height: auto;
        margin-right: 15px;
    }

    .header-text h1 { font-size: 22px; }
    .header-text p { font-size: 14px; color: #ccc; }

    nav ul {
        display: flex;
        list-style: none;
        background: #78c1ee;
        padding: 8px 15px;
    }

    nav ul li {
        margin-right: 25px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    nav ul li:hover { color: #72a3ee; }

    /* Layout Utama - Ini yang membuat kolom panjang ke bawah */
    .main-container {
        display: flex;
        flex: 1; /* Mengisi sisa ruang layar yang tersedia */
    }

    /* Sidebar Kiri */
    .sidebar-left {
        width: 220px;
        background: #f8f9fa;
        border-right: 1px solid #ddd;
        padding: 20px 0;
    }

    .sidebar-left ul { list-style: none; }
    .sidebar-left li {
        padding: 12px 20px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        font-size: 14px;
    }

    .sidebar-left li:hover { background: #e9ecef; }

    /* Konten Tengah */
    .content {
        flex: 1;
        padding: 30px;
        background: #ffffff;
    }

    /* Sidebar Kanan */
    .sidebar-right {
        width: 200px;
        background: #73b8e4; /* Hijau toska sesuai gambar */
        color: white;
        padding: 20px;
    }

    .sidebar-right h3 {
        font-size: 16px;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.3);
        padding-bottom: 5px;
    }

    .link-box a {
        display: block;
        color: white;
        text-decoration: none;
        font-size: 13px;
        margin-bottom: 10px;
    }

    /* Halaman & Animasi */
    .page-section { display: none; }
    .active-page { display: block; animation: fadeIn 0.4s; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Simulasi Canvas */
    .canvas-container {
        margin-top: 20px;
        border: 1px solid #ccc;
        background: #fafafa;
        position: relative;
        max-width: 700px;
    }

    .controls {
        padding: 10px;
        background: #eee;
        text-align: center;
    }
    .container {
        display: flex;
        min-height: 400px;
    }

    .left {
        width: 20%;
        background:blue;
    }

    .left li {
        position: relative;
        padding: 10px;
        cursor: pointer;
    }

    .left li:hover {
        background: rgb(255, 255, 255);
    }

    .left .submenu {
        display: none;
        position: absolute;
        top: 0;
        left: 100%;
        background:beige;
        min-width: 150px;
    }

    .left li:hover .submenu {
        display: block;
    }
    </style>

<body>
    <header>
        <div class="logo-area">
            <!-- Ganti src dengan file lokal jika ada, atau gunakan link ini -->
            <img src="assets/img/logoUnram.png" alt="Logo UNRAM" class="unram-logo">
            <div class="header-text">
                <h1>Prodi Pendidikan Matematika</h1>
                <p>Universitas Mataram</p>
            </div>
        </div>
        <nav>
            <ul>
                <li class="nav-link active" data-target="home"><a href="index.html" style="text-decoration: none;">Home</a></li>
                <li class="nav-link" data-target="profil"><a href="profil.html" style="text-decoration: none;">Profil</a></li>
                <li class="nav-link" data-target="akademik"><a href="akademik.html" style="text-decoration: none;">Akademik</a></li>
                <li class="nav-link" data-target="kontak"><a href="kontak.html" style="text-decoration: none;">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-container">
        <!-- Konten Utama -->
        <div class="content">
            <section id="home" class="page-section active-page">
                <h2>Selamat Datang</h2>
                <br>
                <hr>
                <br>
                <p>Nanti kamu yang isi deh, isinya terserah kamu aja.</p>
                
            </section>
        </div>
    </div>

    
    <script src="assets/js/script.js"></script>
</body>
</html>
